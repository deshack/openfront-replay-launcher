# fly.games.toml
# This app hosts the ephemeral game machines.
# It doesn't need a Dockerfile — machines are created via the Fly Machines API with their own images.
# *.fly.dev is already covered by Fly's wildcard certificate — no cert setup needed.
#
# Run once:
#   fly apps create openfront-games
#
# No deploy needed — machines are created/destroyed dynamically via the builder.
