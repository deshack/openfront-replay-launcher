# fly.builder.toml
# Deploy with: fly deploy --config fly.builder.toml

app = "openfront-builder"     # change to your chosen name
primary_region = "iad"        # pick closest to your users

[build]
  dockerfile = "fly-builder/Dockerfile"

[env]
  PORT = "8080"
  FLY_GAMES_APP = "openfront-games"
  # FLY_REGISTRY_APP is the same as this app's name (openfront-builder)
  FLY_REGISTRY_APP = "openfront-builder"

# Secrets — set via CLI (never commit these):
#   fly secrets set FLY_API_TOKEN=<token> --app openfront-builder
#   fly secrets set CALLBACK_SECRET=<random-string> --app openfront-builder

# The Worker starts the builder explicitly via the Fly Machines API before each job,
# so auto_start_machines is disabled. auto_stop_machines is a belt-and-suspenders
# fallback — the builder self-stops after every job via the API anyway.
[[services]]
  internal_port = 8080
  protocol = "tcp"
  min_machines_running = 0
  auto_stop_machines = "stop"
  auto_start_machines = false

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

# Builder runs only during builds — stopped when idle, started on demand by the Worker.
# shared-cpu-2x with 2GB RAM handles Docker builds comfortably.
# You pay only while the machine is running (~$0.02/hr).
# After first deploy, scale down to 1 machine: fly scale count 1 --app openfront-builder
[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"

# Builder must run privileged for Docker-in-Docker
[experimental]
  privileged = true
