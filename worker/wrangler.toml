name = "openfront-launcher"
main = "src/index.js"
compatibility_date = "2024-09-23"

# KV namespace for session state
# Create with: wrangler kv namespace create SESSIONS
# Then paste the resulting id below
[[kv_namespaces]]
binding = "SESSIONS"
id = "0e889a090a3a4753925b04daf4ec0a23"

[vars]
GHCR_OWNER = "deshack"
FLY_GAMES_APP = "openfront-games"

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = false
# Secrets — set with:
#   wrangler secret put FLY_API_TOKEN
#   wrangler secret put FLY_GAMES_APP
#   wrangler secret put CF_API_TOKEN
#   wrangler secret put CF_ACCOUNT_ID
